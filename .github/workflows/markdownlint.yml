# Markdownlint configuration is implicit (defaults). Add a .markdownlint.json if you need custom rules.
name: markdownlint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # markdownlint-cli v0.39 was stable as of June 2026
      - run: npm install -g markdownlint-cli@^0.39

      - run: markdownlint '**/*.md' --ignore node_modules --ignore .git --ignore docs/evaluation/sogo-6/snapshots/ --ignore docs/evaluation/sogo-6/screenshots/
